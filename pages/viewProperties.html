<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GHAR360 — View Properties</title>
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    .badge { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
    .badge-rent { background: rgba(212,175,55,0.15); color: var(--gold); border: 1px solid rgba(212,175,55,0.3); }
    .badge-sale { background: rgba(62,207,142,0.1);  color: var(--success); border: 1px solid rgba(62,207,142,0.2); }
    .filter-submit-row { display: flex; align-items: flex-end; gap: 10px; }
    .filter-submit-row .btn { padding: 11px 20px; font-size: 12px; white-space: nowrap; }
  </style>
</head>
<body class="dashboard-layout">

  <!-- ══ SIDEBAR ══════════════════════════════════════ -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">🏠</div>
      <div class="brand-text">
        <h2>GHAR360</h2>
        <p>Admin Panel</p>
      </div>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section-label">Main</div>
      <a href="dashboard.html" class="nav-item">
        <div class="nav-icon">📊</div> Dashboard
      </a>

      <div class="nav-section-label">Dealer</div>
      <a href="registerDealer.html" class="nav-item">
        <div class="nav-icon">➕</div> Register Dealer
      </a>
      <a href="registerProperty.html" class="nav-item">
        <div class="nav-icon">🏘</div> Register Property
      </a>
      <a href="viewProperties.html" class="nav-item active">
        <div class="nav-icon">🔍</div> View Properties
      </a>

      <div class="nav-section-label">Location</div>
      <a href="cityState.html" class="nav-item">
        <div class="nav-icon">📍</div> City & State
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="user-card">
        <div class="user-avatar" id="avatarInitial">A</div>
        <div class="user-info">
          <div class="user-name" id="adminUsername">Admin</div>
          <div class="user-role">Administrator</div>
        </div>
      </div>
      <button class="logout-btn" onclick="Auth.logout()">⎋ Sign Out</button>
    </div>
  </aside>

  <!-- ══ MAIN ══════════════════════════════════════════ -->
  <div class="main-content">
    <div class="topbar">
      <div class="topbar-title"><span>View Properties</span></div>
      <div class="topbar-right"><span id="currentDate"></span></div>
    </div>

    <div class="page-content">
      <div class="section-header">
        <div>
          <div class="section-title">View <span>Properties</span></div>
          <div class="section-sub">Filter and browse your registered properties</div>
        </div>
        <button class="btn btn-outline" style="padding:10px 18px;font-size:12px;" onclick="loadProperties()">
          ↺ Refresh
        </button>
      </div>

      <!-- Filter Bar -->
      <div class="filter-bar">
        <div class="form-group">
          <label>Type</label>
          <select id="fType">
            <option value="">All</option>
            <option value="RENT">Rent</option>
            <option value="SALE">Sale</option>
          </select>
        </div>
        <div class="form-group">
          <label>City</label>
          <input type="text" id="fCity" placeholder="Filter by city" />
        </div>
        <div class="form-group">
          <label>Owner Name</label>
          <input type="text" id="fOwner" placeholder="Search owner" />
        </div>
        <div class="form-group">
          <label>Min Price (₹)</label>
          <input type="number" id="fMinPrice" placeholder="0" />
        </div>
        <div class="form-group">
          <label>Max Price (₹)</label>
          <input type="number" id="fMaxPrice" placeholder="Any" />
        </div>
        <div class="filter-submit-row">
          <button class="btn btn-primary btn-filter" onclick="loadProperties()">Search</button>
          <button class="btn btn-outline btn-filter" onclick="clearFilters()">Clear</button>
        </div>
      </div>

      <div id="propertiesContainer">
        <div class="empty-state">
          <div class="empty-icon">🏘</div>
          <p>Click Search to load properties</p>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/utils.js"></script>
  <script>
    Auth.requireAuth();
    UI.setUserInfo();

    const user = Auth.getUser();
    if (user) {
      document.getElementById('adminUsername').textContent = user.username;
      document.getElementById('avatarInitial').textContent = user.username.charAt(0).toUpperCase();
    }

    document.getElementById('currentDate').textContent =
      new Date().toLocaleDateString('en-IN', { weekday:'long', year:'numeric', month:'long', day:'numeric' });

    async function loadProperties() {
      const container = document.getElementById('propertiesContainer');
      UI.showLoading(container);

      const filter = {};
      const fType     = document.getElementById('fType').value;
      const fCity     = document.getElementById('fCity').value.trim();
      const fOwner    = document.getElementById('fOwner').value.trim();
      const fMinPrice = document.getElementById('fMinPrice').value;
      const fMaxPrice = document.getElementById('fMaxPrice').value;

      if (fType)     filter.type      = fType;
      if (fCity)     filter.city      = fCity;
      if (fOwner)    filter.ownerName = fOwner;
      if (fMinPrice) filter.minPrice  = parseFloat(fMinPrice);
      if (fMaxPrice) filter.maxPrice  = parseFloat(fMaxPrice);
	                 filter.isAdmin = 'Y';

      try {
        const res   = await API.getMyProperties(filter);
        const props = res.data || [];

        if (props.length === 0) {
          UI.showEmpty(container, 'No properties found for the selected filters');
          return;
        }

        container.innerHTML = `
          <div style="font-size:12px;color:rgba(255,255,255,0.35);margin-bottom:12px;">
            Showing ${props.length} propert${props.length === 1 ? 'y' : 'ies'}
          </div>
          <div class="properties-grid">
            ${props.map(p => `
              <div class="property-card">
                <div class="property-card-header">
                  <div>
                    <div class="property-title">${p.ownerName || 'Unknown Owner'}</div>
                    <div class="property-meta">${p.locality || ''} ${p.locality && p.city ? '·' : ''} ${p.city || ''}</div>
                  </div>
                  <span class="badge badge-${(p.type||'').toLowerCase()}">${p.type || '—'}</span>
                </div>
                <div class="property-meta">
                  📞 ${p.ownerContact || '—'}<br>
                  📍 ${p.address || '—'}<br>
                  ${p.state ? '&nbsp;&nbsp;&nbsp;' + p.state : ''}
                </div>
                <div class="property-price">${Utils.formatPrice(p.price)}</div>
                <div class="property-footer">
                  <span>Dealer: <strong style="color:var(--gold-light)">${p.dealerCode}</strong></span>
                  <span>ID: #${p.id}</span>
                </div>
              </div>`).join('')}
          </div>`;
      } catch (err) {
        UI.showEmpty(container, err.message || 'Failed to load properties');
      }
    }

    function clearFilters() {
      document.getElementById('fType').value     = '';
      document.getElementById('fCity').value     = '';
      document.getElementById('fOwner').value    = '';
      document.getElementById('fMinPrice').value = '';
      document.getElementById('fMaxPrice').value = '';
      loadProperties();
    }
  </script>
</body>
</html>
