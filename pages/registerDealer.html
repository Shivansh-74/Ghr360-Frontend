<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GHAR360 — Register Dealer</title>
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    .register-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0 24px;
    }
    @media (max-width: 900px) { .register-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body class="dashboard-layout">

  <!-- ══ SIDEBAR ══════════════════════════════════════ -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">🏠</div>
      <div class="brand-text">
        <h2>GHAR360</h2>
        <p>Admin Panel</p>
      </div>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section-label">Main</div>
      <a href="dashboard.html" class="nav-item">
        <div class="nav-icon">📊</div> Dashboard
      </a>

      <div class="nav-section-label">Dealer</div>
      <a href="registerDealer.html" class="nav-item active">
        <div class="nav-icon">➕</div> Register Dealer
      </a>
      <a href="registerProperty.html" class="nav-item">
        <div class="nav-icon">🏘</div> Register Property
      </a>
      <a href="viewProperties.html" class="nav-item">
        <div class="nav-icon">🔍</div> View Properties
      </a>

      <div class="nav-section-label">Location</div>
      <a href="cityState.html" class="nav-item">
        <div class="nav-icon">📍</div> City & State
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="user-card">
        <div class="user-avatar" id="avatarInitial">A</div>
        <div class="user-info">
          <div class="user-name" id="adminUsername">Admin</div>
          <div class="user-role">Administrator</div>
        </div>
      </div>
      <button class="logout-btn" onclick="Auth.logout()">⎋ Sign Out</button>
    </div>
  </aside>

  <!-- ══ MAIN ══════════════════════════════════════════ -->
  <div class="main-content">
    <div class="topbar">
      <div class="topbar-title"><span>Register Dealer</span></div>
      <div class="topbar-right"><span id="currentDate"></span></div>
    </div>

    <div class="page-content">
      <div class="section-header">
        <div>
          <div class="section-title">Register <span>Dealer</span></div>
          <div class="section-sub">Create a new dealer account in the system</div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">Dealer Information</div>
        <div class="card-subtitle">All fields marked * are required</div>

        <form id="dealerForm">
          <div class="register-grid">
            <div class="form-group">
              <label>Username *</label>
              <input type="text" name="username" placeholder="e.g. dealer_rajan" required />
            </div>
            <div class="form-group">
              <label>Password *</label>
              <input type="password" name="password" placeholder="Min 6 characters" required />
            </div>
            <div class="form-group">
              <label>Salutation</label>
              <select name="salutation">
                <option value="">Select</option>
                <option>Mr.</option>
                <option>Mrs.</option>
                <option>Ms.</option>
                <option>Dr.</option>
              </select>
            </div>
            <div class="form-group">
              <label>User Type *</label>
              <select name="userType" required>
                <option value="USER">User (Dealer)</option>
                <option value="ADMIN">Admin</option>
              </select>
            </div>
            <div class="form-group">
              <label>First Name *</label>
              <input type="text" name="firstname" placeholder="First name" required />
            </div>
            <div class="form-group">
              <label>Last Name *</label>
              <input type="text" name="lastname" placeholder="Last name" required />
            </div>
            <div class="form-group">
              <label>Email</label>
              <input type="email" name="email" placeholder="dealer@example.com" />
            </div>
            <div class="form-group">
              <label>Phone Number</label>
              <input type="text" name="phoneNo" placeholder="10-digit mobile" />
            </div>
            <div class="form-group">
              <label>Alternative Number</label>
              <input type="text" name="alternativeNo" placeholder="Optional" />
            </div>
            <div class="form-group">
              <label>Resource Code</label>
              <input type="text" name="resourceCode" placeholder="e.g. RES001" />
            </div>
          </div>

          <div class="gold-divider"></div>

          <div class="register-grid">
            <div class="form-group">
              <label>Address</label>
              <input type="text" name="address" placeholder="Street address" />
            </div>
            <div class="form-group">
              <label>State</label>
              <select id="dealerStateDropdown" name="stateCode" onchange="onStateChange('dealerStateDropdown','dealerCityDropdown')">
                <option value="">Select State</option>
              </select>
            </div>
            <div class="form-group">
              <label>City</label>
              <select id="dealerCityDropdown" name="cityCode">
                <option value="">Select City</option>
              </select>
            </div>
            <div class="form-group">
              <label>Country</label>
              <input type="text" name="country" placeholder="India" />
            </div>
            <div class="form-group">
              <label>Latitude</label>
              <input type="number" step="any" name="lat" placeholder="e.g. 23.2599" />
            </div>
            <div class="form-group">
              <label>Longitude</label>
              <input type="number" step="any" name="longitude" placeholder="e.g. 77.4126" />
            </div>
          </div>

          <div style="margin-top: 8px; display: flex; gap: 12px;">
            <button type="submit" class="btn btn-primary" id="dealerSubmitBtn" style="max-width:220px;">
              Register Dealer
            </button>
            <button type="button" class="btn btn-outline" onclick="document.getElementById('dealerForm').reset()">
              Clear Form
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="../js/utils.js"></script>
  <script>
    Auth.requireAuth();
    UI.setUserInfo();

    const user = Auth.getUser();
    if (user) {
      document.getElementById('adminUsername').textContent = user.username;
      document.getElementById('avatarInitial').textContent = user.username.charAt(0).toUpperCase();
    }

    document.getElementById('currentDate').textContent =
      new Date().toLocaleDateString('en-IN', { weekday:'long', year:'numeric', month:'long', day:'numeric' });

    document.getElementById('dealerForm').addEventListener('submit', async function (e) {
      e.preventDefault();
      const btn = document.getElementById('dealerSubmitBtn');
      await Form.submit(this, btn,
        async (data) => {
          if (data.lat)       data.lat       = parseFloat(data.lat);
          if (data.longitude) data.longitude = parseFloat(data.longitude);
          return await API.register(data);
        },
        () => { Form.reset(document.getElementById('dealerForm')); }
      );
    });

    // Load state dropdown on page load
    loadLocationDropdown('dealerStateDropdown', null);

    function onStateChange(stateDdId, cityDdId) {
      const stateCode = document.getElementById(stateDdId).value;
      const cityDd    = document.getElementById(cityDdId);
      cityDd.innerHTML = '<option value="">Select City</option>';
      if (stateCode) loadLocationDropdown(cityDdId, stateCode);
    }

    async function loadLocationDropdown(ddId, stateCode) {
      const endpoint = stateCode
        ? `/api/location/map/cities/${stateCode}`
        : '/api/location/map/states';
      try {
        const res = await API.get(endpoint, false);
        const dd  = document.getElementById(ddId);
        const map = res.data || {};
        Object.entries(map).forEach(([code, name]) => {
          dd.add(new Option(`${name} (${code})`, code));
        });
      } catch (e) {
        console.error('Location dropdown failed', e);
      }
    }
  </script>
</body>
</html>
